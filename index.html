<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pembelajaran Interaktif</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Area Slide */
        #slide-container { flex: 1; border: none; width: 100%; height: 100%; }

        /* Navigasi */
        .controls { 
            background: #2c3e50; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px;
            color: white;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        #slide-info { font-size: 1.1rem; }
    </style>
</head>
<body>

    <iframe id="slide-container" src="slide1.html"></iframe>

    <div class="controls">
        <button id="prevBtn" onclick="changeSlide(-1)" disabled>Kembali</button>
        <div id="slide-info">Slide <span id="currentNum">1</span> / 15</div>
        <button id="nextBtn" onclick="changeSlide(1)">Lanjut</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 15;
        const iframe = document.getElementById('slide-container');
        const currentNumDisplay = document.getElementById('currentNum');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function changeSlide(step) {
            currentSlide += step;

            // Update file yang dipanggil di iframe
            iframe.src = `slide${currentSlide}.html`;

            // Update tampilan nomor slide
            currentNumDisplay.innerText = currentSlide;

            // Kontrol tombol (mati jika di ujung slide)
            prevBtn.disabled = (currentSlide === 1);
            nextBtn.disabled = (currentSlide === totalSlides);
        }
    </script>
</body>
</html>
